version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - gocritic
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      disabled-checks:
        - hugeParam
      enabled-tags:
        - diagnostic
        - style
        - performance
    govet:
      disable:
        - fieldalignment
      enable-all: true
    misspell:
      locale: US
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gocritic
        path: _test\.go
      - linters:
          - unused
        path: examples/
      - linters:
          - gochecknoinits
        source: ^func init\(
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/hexagon-codes/toolkit
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
