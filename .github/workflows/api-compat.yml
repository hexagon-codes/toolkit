name: API Compatibility

# 用 gorelease 对照上一个 tag 检测导出 API 的破坏式变更，提示 SemVer 应升 major/minor。
# v0.x 阶段为提示性（不硬失败）；v1.0 后改为破坏式变更即 CI 红。
on:
  pull_request:
    branches: [main]

jobs:
  gorelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: '1.25.5' }
      - name: Install gorelease
        run: go install golang.org/x/exp/cmd/gorelease@latest
      - name: Check API compatibility
        run: gorelease || echo "::warning::gorelease 报告了 API 变更，请确认 SemVer 版本号相应升级"
