name: Downstream Contract

# 接缝契约门禁：toolkit（L0）任何改动，必须让全部消费者（ai-core / hexagon / hexclaw）
# 在 go.work 下 build+test 仍全绿。底座层影响面最广，门禁最严。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  downstream:
    name: ai-core + hexagon + hexclaw against this toolkit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: toolkit }
      - uses: actions/checkout@v4
        with: { repository: hexagon-codes/ai-core, path: ai-core }
      - uses: actions/checkout@v4
        with: { repository: hexagon-codes/hexagon, path: hexagon }
      - uses: actions/checkout@v4
        with: { repository: hexagon-codes/hexclaw, path: hexclaw }
      - uses: actions/setup-go@v5
        with: { go-version: '1.25.7' }
      - name: go.work（下游用本 PR 的 toolkit）
        run: go work init ./toolkit ./ai-core ./hexagon ./hexclaw
      - name: ai-core build + test
        run: (cd ai-core && go build ./... && go test ./...)
      - name: hexagon build + test
        run: (cd hexagon && go build ./... && go test ./...)
      - name: hexclaw build + test
        run: (cd hexclaw && go build ./... && go test ./...)
